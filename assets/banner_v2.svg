<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="100%">
  <defs>
    <!-- Background Card Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Glowing Background Lights -->
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>

    <!-- Folder Gradients -->
    <linearGradient id="folderBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <linearGradient id="folderFrontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="60%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Screen Gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.9" />
    </linearGradient>

    <!-- Treadmill Metal Gradient -->
    <linearGradient id="treadmillMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="50%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Wordmark Pro Gradient -->
    <linearGradient id="proGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e40" />
      <stop offset="100%" stop-color="#ff2525" />
    </linearGradient>
  </defs>

  <style>
    /* Bobbing animation for the folder character */
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-5px) rotate(1deg); }
    }
    .bobbing {
      animation: bob 0.6s infinite ease-in-out;
      transform-origin: 265px 170px;
    }

    /* Running animations for legs */
    @keyframes run-left {
      0%, 100% { transform: rotate(-28deg); }
      50% { transform: rotate(28deg); }
    }
    @keyframes run-right {
      0%, 100% { transform: rotate(28deg); }
      50% { transform: rotate(-28deg); }
    }
    .left-leg {
      animation: run-left 0.45s infinite linear;
      transform-origin: 240px 200px;
    }
    .right-leg {
      animation: run-right 0.45s infinite linear;
      transform-origin: 290px 200px;
    }

    /* Swinging animations for arms */
    @keyframes swing-right-arm {
      0%, 100% { transform: rotate(-25deg); }
      50% { transform: rotate(25deg); }
    }
    @keyframes swing-left-arm {
      0%, 100% { transform: rotate(25deg); }
      50% { transform: rotate(-25deg); }
    }
    .right-arm {
      animation: swing-right-arm 0.45s infinite ease-in-out;
      transform-origin: 330px 145px;
    }
    .left-arm {
      animation: swing-left-arm 0.45s infinite ease-in-out;
      transform-origin: 220px 140px;
    }

    /* Belt line movement animation */
    @keyframes run-belt {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -30; }
    }
    .belt-line {
      animation: run-belt 0.15s infinite linear;
    }

    /* Speed flow animation for background lines */
    @keyframes speed-flow {
      0% { stroke-dasharray: 10 100; stroke-dashoffset: 0; opacity: 0; }
      30% { opacity: 0.6; }
      70% { opacity: 0.6; }
      100% { stroke-dasharray: 50 60; stroke-dashoffset: -110; opacity: 0; }
    }
    .speed-line {
      stroke: #38bdf8;
      stroke-width: 3;
      stroke-linecap: round;
      animation: speed-flow 0.5s infinite linear;
    }

    /* Sweat drop animations */
    @keyframes sweat-fly-1 {
      0% { transform: translate(190px, 120px) scale(0.4); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translate(140px, 140px) scale(1); opacity: 0; }
    }
    @keyframes sweat-fly-2 {
      0% { transform: translate(185px, 165px) scale(0.4); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translate(135px, 185px) scale(1); opacity: 0; }
    }
    @keyframes sweat-fly-3 {
      0% { transform: translate(350px, 115px) scale(0.4); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translate(320px, 135px) scale(1); opacity: 0; }
    }
    .sweat-1 { animation: sweat-fly-1 0.6s infinite linear; }
    .sweat-2 { animation: sweat-fly-2 0.45s infinite linear; }
    .sweat-3 { animation: sweat-fly-3 0.55s infinite linear; }

    /* Floating icons in background */
    @keyframes float-slow-1 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(3deg); }
    }
    @keyframes float-slow-2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-4deg); }
    }
    .floating-icon-1 {
      animation: float-slow-1 4.5s infinite ease-in-out;
      transform-origin: 100px 80px;
    }
    .floating-icon-2 {
      animation: float-slow-2 5.5s infinite ease-in-out;
      transform-origin: 1080px 80px;
    }
    .floating-icon-3 {
      animation: float-slow-1 6.5s infinite ease-in-out;
      transform-origin: 1050px 195px;
    }

    /* Interactive hover zoom for pills */
    .pill {
      transition: transform 0.2s ease, stroke 0.2s ease;
      cursor: pointer;
    }
    .pill:hover {
      transform: scale(1.03);
    }
  </style>

  <!-- ================= BACKGROUND ================= -->
  <!-- Rounded rect card that works on light and dark github backgrounds -->
  <rect width="1200" height="340" rx="24" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2" />

  <!-- Background neon glows -->
  <circle cx="280" cy="180" r="160" fill="url(#glowCyan)" opacity="0.15" />
  <circle cx="850" cy="170" r="220" fill="url(#glowAmber)" opacity="0.1" />

  <!-- Subtle grid lines in background -->
  <path d="M 0 40 L 1200 40 M 0 80 L 1200 80 M 0 120 L 1200 120 M 0 160 L 1200 160 M 0 200 L 1200 200 M 0 240 L 1200 240 M 0 280 L 1200 280 M 0 320 L 1200 320" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 8" opacity="0.25" />
  <path d="M 100 0 L 100 340 M 200 0 L 200 340 M 300 0 L 300 340 M 400 0 L 400 340 M 500 0 L 500 340 M 600 0 L 600 340 M 700 0 L 700 340 M 800 0 L 800 340 M 900 0 L 900 340 M 1000 0 L 1000 340 M 1100 0 L 1100 340" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 8" opacity="0.25" />

  <!-- Floating background icons (Power user elements) -->
  <g class="floating-icon-1" opacity="0.15">
    <path d="M 90 90 L 90 75 Q 90 72 93 72 L 105 72 Q 108 72 110 75 L 112 78 L 125 78 Q 128 78 128 81 L 128 105 Q 128 108 125 108 L 95 108 Q 92 108 92 105 Z" fill="none" stroke="#38bdf8" stroke-width="2" />
  </g>
  <g class="floating-icon-2" opacity="0.15">
    <circle cx="1075" cy="80" r="10" fill="none" stroke="#38bdf8" stroke-width="2" />
    <line x1="1082" y1="87" x2="1092" y2="97" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />
  </g>
  <g class="floating-icon-3" opacity="0.12">
    <circle cx="1050" cy="195" r="8" fill="none" stroke="#38bdf8" stroke-width="2" />
    <path d="M 1050 183 L 1050 187 M 1050 203 L 1050 207 M 1038 195 L 1042 195 M 1058 195 L 1062 195 M 1041 186 L 1044 189 M 1059 204 L 1062 207 M 1041 204 L 1044 201 M 1059 186 L 1062 183" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- ================= FOREGROUND (SAFE ZONE) ================= -->

  <!-- Speed / Motion Lines -->
  <line x1="100" y1="110" x2="170" y2="110" class="speed-line" style="animation-delay: 0.1s;" />
  <line x1="90" y1="150" x2="160" y2="150" class="speed-line" />
  <line x1="105" y1="190" x2="175" y2="190" class="speed-line" style="animation-delay: 0.2s;" />

  <!-- Flying sweat drops -->
  <g class="sweat-1">
    <path d="M 0 -5 C -2 0, -4 3, 0 7 C 4 3, 2 0, 0 -5 Z" fill="#38bdf8" opacity="0.8" />
  </g>
  <g class="sweat-2">
    <path d="M 0 -5 C -2 0, -4 3, 0 7 C 4 3, 2 0, 0 -5 Z" fill="#38bdf8" opacity="0.8" />
  </g>
  <g class="sweat-3">
    <path d="M 0 -5 C -2 0, -4 3, 0 7 C 4 3, 2 0, 0 -5 Z" fill="#38bdf8" opacity="0.8" />
  </g>

  <!-- Left: Workout Folder Character & Treadmill -->
  <g id="gym-scene">
    <!-- Treadmill base & shadows -->
    <g id="treadmill">
      <!-- Shadow under treadmill -->
      <ellipse cx="270" cy="272" rx="150" ry="6" fill="#000000" opacity="0.45" />

      <!-- Console Support Neck -->
      <path d="M 370 253 L 395 150" fill="none" stroke="#475569" stroke-width="12" stroke-linecap="round" />
      <path d="M 370 253 L 395 150" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" />
      
      <!-- Console Head -->
      <g transform="translate(395, 150) rotate(-15)">
        <rect x="-25" y="-18" width="50" height="36" rx="6" fill="#1e293b" stroke="#0f172a" stroke-width="2.5" />
        <!-- Screen -->
        <rect x="-20" y="-13" width="40" height="26" rx="3" fill="#0284c7" />
        <rect x="-20" y="-13" width="40" height="26" rx="3" fill="url(#screenGrad)" />
        <!-- Screen details (stats & pulse) -->
        <path d="M -15 -5 L 15 -5 M -15 2 L 5 2" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />
        <path d="M -15 8 L -8 8 L -6 2 L -4 14 L -2 8 L 15 8" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>

      <!-- Base Frame -->
      <path d="M 120 253 L 390 253 Q 405 253 400 266 L 385 268 Q 375 270 365 270 L 140 270 Q 120 270 120 253 Z" fill="url(#treadmillMetal)" stroke="#0f172a" stroke-width="2" />
      
      <!-- Red sporty stripe on the frame -->
      <path d="M 135 258 L 380 258" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" />

      <!-- Belt Area -->
      <polygon points="140,254 365,254 355,268 150,268" fill="#111827" />

      <!-- Moving Belt Lines -->
      <line x1="160" y1="261" x2="345" y2="261" stroke="#374151" stroke-width="3" stroke-dasharray="12 18" class="belt-line" />
      <line x1="155" y1="265" x2="340" y2="265" stroke="#374151" stroke-width="2.5" stroke-dasharray="8 22" class="belt-line" />
    </g>

    <!-- Folder Character (Bobbing and Running) -->
    <g id="folder-character" class="bobbing">
      <!-- Left Arm (in background) -->
      <g class="left-arm">
        <path d="M 220 140 L 195 160 L 210 180" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />
        <circle cx="210" cy="180" r="10" fill="#dddddd" stroke="#0f172a" stroke-width="3" opacity="0.6" />
      </g>

      <!-- Left Leg -->
      <g class="left-leg">
        <path d="M 240 200 L 220 225 L 245 248" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        <g transform="translate(245, 248)">
          <path d="M -12 -2 L 12 -2 L 15 8 L -15 8 Z" fill="#ffffff" stroke="#0f172a" stroke-width="3" stroke-linejoin="round" />
          <path d="M -15 8 L 15 8 L 12 12 L -12 12 Z" fill="#ff4757" />
          <circle cx="2" cy="3" r="2" fill="#ff4757" />
        </g>
      </g>

      <!-- Right Leg -->
      <g class="right-leg">
        <path d="M 290 200 L 315 225 L 295 248" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        <g transform="translate(295, 248)">
          <path d="M -12 -2 L 12 -2 L 15 8 L -15 8 Z" fill="#ffffff" stroke="#0f172a" stroke-width="3" stroke-linejoin="round" />
          <path d="M -15 8 L 15 8 L 12 12 L -12 12 Z" fill="#ff4757" />
          <circle cx="2" cy="3" r="2" fill="#ff4757" />
        </g>
      </g>

      <!-- Folder Back Flap -->
      <path d="M 200 95 Q 200 75 215 75 L 245 75 Q 255 75 260 85 L 265 90 L 325 90 Q 335 90 335 100 L 335 190 Q 335 200 325 200 L 210 200 Q 200 200 200 190 Z" fill="url(#folderBackGrad)" stroke="#78350f" stroke-width="2" />

      <!-- Paper sheets sticking out -->
      <!-- Blue sheet -->
      <rect x="225" y="66" width="85" height="90" rx="6" fill="#38bdf8" transform="rotate(-4 260 110)" stroke="#0284c7" stroke-width="1.5" />
      <line x1="235" y1="81" x2="295" y2="81" stroke="#bae6fd" stroke-width="3" stroke-linecap="round" transform="rotate(-4 260 110)" />
      <line x1="235" y1="96" x2="280" y2="96" stroke="#bae6fd" stroke-width="3" stroke-linecap="round" transform="rotate(-4 260 110)" />
      <line x1="235" y1="111" x2="290" y2="111" stroke="#bae6fd" stroke-width="3" stroke-linecap="round" transform="rotate(-4 260 110)" />

      <!-- White sheet -->
      <rect x="240" y="62" width="80" height="95" rx="6" fill="#ffffff" transform="rotate(3 280 110)" stroke="#cbd5e1" stroke-width="1.5" />
      <line x1="250" y1="77" x2="310" y2="77" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" transform="rotate(3 280 110)" />
      <line x1="250" y1="92" x2="295" y2="92" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" transform="rotate(3 280 110)" />
      <line x1="250" y1="107" x2="305" y2="107" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" transform="rotate(3 280 110)" />

      <!-- Folder Front Flap -->
      <path d="M 200 105 Q 200 100 208 100 L 327 100 Q 335 100 335 105 L 335 190 Q 335 200 325 200 L 210 200 Q 200 200 200 190 Z" fill="url(#folderFrontGrad)" stroke="#78350f" stroke-width="2" />

      <!-- Striped Sweatband on forehead -->
      <rect x="195" y="110" width="145" height="18" rx="4" fill="#ef4444" stroke="#7f1d1d" stroke-width="1.5" />
      <rect x="195" y="116" width="145" height="6" fill="#ffffff" />

      <!-- Expressive Face (Determined Workout Mode) -->
      <!-- Eyes -->
      <circle cx="240" cy="145" r="15" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
      <circle cx="285" cy="145" r="15" fill="#ffffff" stroke="#0f172a" stroke-width="2.5" />
      <!-- Pupils -->
      <circle cx="244" cy="145" r="7.5" fill="#0f172a" />
      <circle cx="289" cy="145" r="7.5" fill="#0f172a" />
      <!-- Pupil Catchlights -->
      <circle cx="246.5" cy="142.5" r="3" fill="#ffffff" />
      <circle cx="291.5" cy="142.5" r="3" fill="#ffffff" />
      <!-- Eyebrows (Tilted Inward / Angry-Determined) -->
      <path d="M 222 128 L 252 134" fill="none" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" />
      <path d="M 303 128 L 273 134" fill="none" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" />
      <!-- Cheeks (Blushed from effort) -->
      <circle cx="222" cy="156" r="6" fill="#ef4444" opacity="0.35" />
      <circle cx="303" cy="156" r="6" fill="#ef4444" opacity="0.35" />
      <!-- Panting Mouth -->
      <path d="M 256 162 Q 262 176 269 162" fill="#7f1d1d" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
      <path d="M 259 168 Q 262 164 266 168 Q 262 174 259 168" fill="#f43f5e" />

      <!-- Drip of sweat running down cheek -->
      <path d="M 226 136 Q 224 142 227 145 Q 230 142 226 136" fill="#38bdf8" opacity="0.9" />

      <!-- Right Arm (in foreground) -->
      <g class="right-arm">
        <path d="M 330 145 L 352 165 L 338 182" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="338" cy="182" r="10" fill="#ffffff" stroke="#0f172a" stroke-width="3" />
      </g>
    </g>
  </g>

  <!-- Right: Branding Texts & Pills -->
  <g id="branding-group">
    <!-- Wordmark -->
    <text x="520" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" letter-spacing="-1.5px">
      <tspan fill="#ffffff">Explorer</tspan><tspan fill="url(#proGrad)">Pro</tspan>
    </text>

    <!-- Tagline -->
    <text x="520" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#94a3b8" letter-spacing="0.5px">
      The Power User File Explorer
    </text>

    <!-- Features Pill Badges (Interactive & Glow) -->
    <!-- Pill 1: FAST SEARCH -->
    <g class="pill" transform="translate(0, 0)">
      <rect x="520" y="225" width="120" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="580" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="1px">FAST SEARCH</text>
    </g>
    <!-- Pill 2: TABS & SPLIT -->
    <g class="pill" transform="translate(0, 0)">
      <rect x="655" y="225" width="120" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="715" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="1px">TABS &amp; SPLIT</text>
    </g>
    <!-- Pill 3: MULTI-AGENT -->
    <g class="pill" transform="translate(0, 0)">
      <rect x="790" y="225" width="120" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="850" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="1px">MULTI-AGENT</text>
    </g>
    <!-- Pill 4: SMART TAGS -->
    <g class="pill" transform="translate(0, 0)">
      <rect x="925" y="225" width="120" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="985" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="1px">SMART TAGS</text>
    </g>
  </g>
</svg>
